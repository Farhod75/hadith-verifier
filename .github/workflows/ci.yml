name: Hadith Verifier CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run API tests
        run: npx playwright test tests/api.spec.ts --reporter=list --workers=1 --project=chromium
        env:
          BASE_URL: https://hadithverifier.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run E2E tests
        run: npx playwright test tests/hadith-verifier.spec.ts --reporter=list --workers=1 --project=chromium
        env:
          BASE_URL: https://hadithverifier.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run Audit tests
        run: npx playwright test tests/audit.spec.ts --reporter=list --workers=1 --project=chromium
        env:
          BASE_URL: https://hadithverifier.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7